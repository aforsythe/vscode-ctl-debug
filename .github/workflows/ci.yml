name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build + test (${{ matrix.os }} · Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The extension itself is platform-agnostic; we test on Linux
        # (cheapest), macOS (the platform we build ctldap on most),
        # and Windows (smoke that path handling doesn't break).
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Node 20 is the minimum that ships with current VS Code
        # internal Node; 22 is the LTS we'd target next.
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run compile
      - run: npm test

  package:
    name: Build .vsix
    runs-on: ubuntu-latest
    # Only package once — the .vsix is platform-independent.  Skip if
    # the build-test matrix had any failures.
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run compile
      - run: npx --yes @vscode/vsce package --no-yarn

      - name: Upload .vsix as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctl-debug-vsix
          path: '*.vsix'
          if-no-files-found: error
          retention-days: 30
